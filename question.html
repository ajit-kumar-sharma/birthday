<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Questions for You ✨</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0D0D0D 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .text-gradient {
            background: linear-gradient(135deg, #C8A2C8 0%, #9D4EDD 50%, #E0B0FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(157, 78, 221, 0.3);
            border-radius: 50%;
            animation: floatParticle 15s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #C8A2C8;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border: 1px solid rgba(200, 162, 200, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-link:hover {
            background: rgba(157, 78, 221, 0.2);
            border-color: #9D4EDD;
        }

        #questionnaire {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .question-card {
            max-width: 600px;
            width: 100%;
            background: linear-gradient(145deg, #1E3A8A, #8E2DE2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: clamp(2.5rem, 6vw, 4rem);
            box-shadow: 0 25px 50px rgba(142, 45, 226, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
            }
        }

        .question-number {
            font-size: 0.85rem;
            font-weight: 700;
            color: #C8A2C8;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .question-text {
            font-size: clamp(1.5rem, 4.5vw, 2rem);
            font-weight: 600;
            color: #fff;
            line-height: 1.5;
            margin-bottom: 3rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(1rem, 2vw, 2rem);
            justify-content: center;
            align-items: center;
        }

        .btn-yes {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.1rem, 2.5vw, 1.25rem);
            font-weight: 700;
            color: #fff;
            background: #9D4EDD;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            min-width: 160px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(157, 78, 221, 0.4);
        }

        .btn-yes:hover {
            transform: scale(1.05);
            background: #C77DFF;
            box-shadow: 0 0 25px rgba(157, 78, 221, 0.7);
        }

        .btn-no {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1rem, 2vw, 1.15rem);
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 1rem;
            min-width: 230px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .btn-no:hover:not(.disabled) {
            transform: scale(1.03);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-no.disabled {
            color: #E0B0FF;
            background: rgba(157, 78, 221, 0.2);
            border: 1px solid rgba(157, 78, 221, 0.4);
            cursor: not-allowed;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px rgba(157,78,221,0.3); }
            50% { box-shadow: 0 0 30px rgba(157,78,221,0.7); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
            20%, 40%, 60%, 80% { transform: translateX(8px); }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        /* Completion Screen */
        .completion {
            text-align: center;
            position: relative;
            animation: fadeIn 1s ease-out;
        }

        .completion h2 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 800;
            text-shadow: 0 0 30px rgba(200, 162, 200, 0.4);
            margin-bottom: 2rem;
        }

        .completion p {
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            font-weight: 500;
            color: #EAEAEA;
            opacity: 0.9;
        }

        .completion .back-btn {
            display: inline-block;
            margin-top: 3rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #9D4EDD, #C77DFF);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 5px 20px rgba(157, 78, 221, 0.4);
            transition: all 0.3s ease;
        }

        .completion .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(157, 78, 221, 0.6);
        }

        /* Particle Burst */
        .burst-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            pointer-events: none;
        }

        .burst-particle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: burst 3s ease-out forwards;
        }

        @keyframes burst {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Back Link -->
    <a href="index.html" class="back-link">← Back</a>

    <!-- Background particles -->
    <div class="bg-particles">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
        <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 1s;"></div>
        <div class="particle" style="left: 50%; animation-delay: 3s;"></div>
        <div class="particle" style="left: 60%; animation-delay: 5s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 2.5s;"></div>
        <div class="particle" style="left: 80%; animation-delay: 4.5s;"></div>
        <div class="particle" style="left: 90%; animation-delay: 1.5s;"></div>
        <div class="particle" style="left: 15%; animation-delay: 3.5s;"></div>
        <div class="particle" style="left: 85%; animation-delay: 0.5s;"></div>
    </div>

    <!-- Questionnaire -->
    <section id="questionnaire">
        <div class="question-card" id="questionCard">
            <div class="question-number" id="questionNumber">Question 1 of 6</div>
            <h2 class="question-text" id="questionText">Are you secretly smiling while reading this?</h2>
            <div class="buttons">
                <button class="btn-yes" id="btnYes">YES</button>
                <button class="btn-no" id="btnNo">NO</button>
            </div>
        </div>

        <div class="completion hidden" id="completion">
            <div class="burst-container" id="burstContainer"></div>
            <h2 class="text-gradient">That means everything to me.</h2>
            <p>Thank You for going through all this, Arju 😊</p>
            <a href="index.html" class="back-btn">Go Back to Birthday Page 💜</a>
        </div>
    </section>

    <script>
        const questions = [
            "Are you secretly smiling while reading this?",
            "Will you remember me in future?",
            "Promise to always be yourself around me?",
            "Will you miss me a little after closing this page?",
            "Can we at least promise to never hate each other?",
            "Can we keep creating memories together?"
        ];

        const noTexts = [
            "NO",
            "Are you sure? 🥺",
            "Think again 💭",
            "Really sure? 💔",
            "I'll be sad… 😢",
            "Please? 💜",
            "Last chance 😔",
            "You can't say no 😌"
        ];

        let currentQuestion = 0;
        let noClicks = 0;

        const questionCard = document.getElementById('questionCard');
        const questionNumber = document.getElementById('questionNumber');
        const questionText = document.getElementById('questionText');
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const completion = document.getElementById('completion');
        const burstContainer = document.getElementById('burstContainer');

        function updateQuestion() {
            questionNumber.textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
            questionText.textContent = questions[currentQuestion];
            noClicks = 0;
            btnNo.textContent = noTexts[0];
            btnNo.classList.remove('disabled');
        }

        function createBurst() {
            const colors = ['#9D4EDD', '#C8A2C8', '#F5F7FA'];
            for (let i = 0; i < 45; i++) {
                const particle = document.createElement('div');
                particle.className = 'burst-particle';
                const angle = (i / 45) * 360;
                const distance = 150 + Math.random() * 150;
                const tx = Math.cos(angle * Math.PI / 180) * distance + 'px';
                const ty = Math.sin(angle * Math.PI / 180) * distance + 'px';
                particle.style.setProperty('--tx', tx);
                particle.style.setProperty('--ty', ty);
                particle.style.background = colors[i % 3];
                particle.style.boxShadow = '0 0 15px rgba(157, 78, 221, 0.8)';
                particle.style.animationDelay = (Math.random() * 0.5) + 's';
                burstContainer.appendChild(particle);
            }
        }

        btnYes.addEventListener('click', () => {
            if (currentQuestion < questions.length - 1) {
                questionCard.style.animation = 'fadeOut 0.3s ease-out forwards';
                setTimeout(() => {
                    currentQuestion++;
                    updateQuestion();
                    questionCard.style.animation = 'fadeIn 0.6s ease-out forwards';
                }, 300);
            } else {
                questionCard.classList.add('hidden');
                completion.classList.remove('hidden');
                createBurst();
            }
        });

        btnNo.addEventListener('click', () => {
            if (noClicks >= noTexts.length - 1) return;

            if (noClicks === noTexts.length - 2) {
                btnNo.classList.add('shake');
                setTimeout(() => btnNo.classList.remove('shake'), 400);
            }

            noClicks++;
            btnNo.textContent = noTexts[noClicks];

            if (noClicks >= noTexts.length - 1) {
                btnNo.classList.add('disabled');
            }
        });
    </script>
</body>
</html>
